name: qubitx

x-common-service: &common-service
  build:
    context: .
    dockerfile: Dockerfile
  image: qubitx-backend:latest
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  api:
    <<: *common-service
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-8095}:8000"

  worker:
    <<: *common-service
    command: python -m backend.app.worker

  scheduler:
    <<: *common-service
    command: python -m backend.app.scheduler

  live-engine:
    <<: *common-service
    command: python -m backend.app.live_engine

  migrate:
    <<: *common-service
    restart: "no"
    command: python -m backend.app.migrate upgrade
    profiles:
      - ops

