services:
  trading-webhook-api:
    image: algotrade-trading-webhook:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-webhook-api
    restart: unless-stopped
    env_file:
      - .env
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${APP_HOST_BIND:-0.0.0.0}:${APP_PORT:-8095}:8000"
  trading-worker:
    image: algotrade-trading-webhook:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-worker
    restart: unless-stopped
    env_file:
      - .env
    command: python -m backend.app.worker

