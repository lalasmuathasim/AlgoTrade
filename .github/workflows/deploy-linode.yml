name: Deploy Qubitx Zerodha Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: qubitx-zerodha-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.LINODE_HOST }}
      DEPLOY_USER: ${{ secrets.LINODE_USERNAME }}
      DEPLOY_PORT: ${{ secrets.LINODE_PORT || '22' }}
      DEPLOY_BASE: /var/www/clients/client0/web13
      APP_DOMAIN: qubitx.ai
      HAS_DEPLOY_KEY: ${{ secrets.LINODE_SSH_KEY != '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      REDIS_QUEUE_PREFIX: ${{ secrets.REDIS_QUEUE_PREFIX || 'qubitx' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY || '' }}
      ZERODHA_API_SECRET: ${{ secrets.ZERODHA_API_SECRET || '' }}
      ZERODHA_ACCESS_TOKEN: ${{ secrets.ZERODHA_ACCESS_TOKEN || '' }}
      ZERODHA_REDIRECT_URL: ${{ secrets.ZERODHA_REDIRECT_URL || '' }}
      ZERODHA_LIVE_TRADING_ENABLED: ${{ secrets.ZERODHA_LIVE_TRADING_ENABLED || 'false' }}
      PAPER_TRADING_ENABLED: ${{ secrets.PAPER_TRADING_ENABLED || 'true' }}
      DAILY_SCAN_TIME: ${{ secrets.DAILY_SCAN_TIME || '15:45' }}
      MARKET_TIMEZONE: ${{ secrets.MARKET_TIMEZONE || 'Asia/Kolkata' }}
      BUY_VOLUME_MULTIPLIER: ${{ secrets.BUY_VOLUME_MULTIPLIER || secrets.STRATEGY_TUNING__BUYVOLUMEMULTIPLIER || '5' }}
      SELL_VOLUME_MULTIPLIER: ${{ secrets.SELL_VOLUME_MULTIPLIER || secrets.STRATEGY_TUNING__SELLVOLUMEMULTIPLIER || '3' }}
      ENTRY_BUFFER_TICKS: ${{ secrets.ENTRY_BUFFER_TICKS || secrets.STRATEGY_TUNING__ENTRYBUFFERTICKS || '0.05' }}
      STOP_BUFFER_TICKS: ${{ secrets.STOP_BUFFER_TICKS || secrets.STRATEGY_TUNING__STOPLOSSBUFFERTICKS || '0.05' }}
      DAILY_CANDLE_LOOKBACK: ${{ secrets.DAILY_CANDLE_LOOKBACK || '100' }}
      SWING_WINDOW: ${{ secrets.SWING_WINDOW || '2' }}
      MAX_GAP_PERCENT: ${{ secrets.MAX_GAP_PERCENT || secrets.STRATEGY_TUNING__MAXGAPPERCENT || '0.5' }}
      MIN_SWING_DISTANCE: ${{ secrets.MIN_SWING_DISTANCE || secrets.STRATEGY_TUNING__MINSWINGDISTANCE || '1.0' }}
      MOCK_DATA: ${{ secrets.MOCK_DATA }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      API_HOST_PORT: ${{ secrets.API_HOST_PORT || secrets.APP_PORT || '8095' }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
      SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
      INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
      INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
      INITIAL_ADMIN_NAME: ${{ secrets.INITIAL_ADMIN_NAME }}
      TOTP_ISSUER: ${{ secrets.TOTP_ISSUER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          set -eu

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing LINODE_HOST secret."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing LINODE_USERNAME secret."
            exit 1
          fi

          if [ "${HAS_DEPLOY_KEY}" != "true" ]; then
            echo "Missing LINODE_SSH_KEY secret."
            exit 1
          fi

          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL secret."
            exit 1
          fi

          if [ -z "${REDIS_URL}" ]; then
            echo "Missing REDIS_URL secret."
            exit 1
          fi

          if [ -z "${JWT_SECRET}" ]; then
            echo "Missing JWT_SECRET secret."
            exit 1
          fi

          if [ -z "${PAPER_TRADING_ENABLED}" ]; then
            echo "Missing PAPER_TRADING_ENABLED secret."
            exit 1
          fi

          if [ -z "${ZERODHA_LIVE_TRADING_ENABLED}" ]; then
            echo "Missing ZERODHA_LIVE_TRADING_ENABLED secret."
            exit 1
          fi

          if [ -z "${DAILY_SCAN_TIME}" ]; then
            echo "Missing DAILY_SCAN_TIME secret."
            exit 1
          fi

          if [ -z "${MARKET_TIMEZONE}" ]; then
            echo "Missing MARKET_TIMEZONE secret."
            exit 1
          fi

          if [ -z "${BUY_VOLUME_MULTIPLIER}" ]; then
            echo "Missing BUY_VOLUME_MULTIPLIER secret."
            exit 1
          fi

          if [ -z "${SELL_VOLUME_MULTIPLIER}" ]; then
            echo "Missing SELL_VOLUME_MULTIPLIER secret."
            exit 1
          fi

          if [ -z "${ENTRY_BUFFER_TICKS}" ]; then
            echo "Missing ENTRY_BUFFER_TICKS secret."
            exit 1
          fi

          if [ -z "${STOP_BUFFER_TICKS}" ]; then
            echo "Missing STOP_BUFFER_TICKS secret."
            exit 1
          fi

          if [ -z "${INITIAL_ADMIN_EMAIL}" ]; then
            echo "Missing INITIAL_ADMIN_EMAIL secret."
            exit 1
          fi

          if [ -z "${INITIAL_ADMIN_PASSWORD}" ]; then
            echo "Missing INITIAL_ADMIN_PASSWORD secret."
            exit 1
          fi

          if [ -z "${INITIAL_ADMIN_NAME}" ]; then
            echo "Missing INITIAL_ADMIN_NAME secret."
            exit 1
          fi

          if [ -z "${SESSION_COOKIE_NAME}" ]; then
            echo "Missing SESSION_COOKIE_NAME secret."
            exit 1
          fi

          if [ -z "${SESSION_COOKIE_SECURE}" ]; then
            echo "Missing SESSION_COOKIE_SECURE secret."
            exit 1
          fi

          if [ -z "${ACCESS_TOKEN_EXPIRE_MINUTES}" ]; then
            echo "Missing ACCESS_TOKEN_EXPIRE_MINUTES secret."
            exit 1
          fi

          if [ -z "${LOG_LEVEL}" ]; then
            echo "Missing LOG_LEVEL secret."
            exit 1
          fi

          if [ -z "${MOCK_DATA}" ]; then
            echo "Missing MOCK_DATA secret."
            exit 1
          fi

          if [ -z "${TOTP_ISSUER}" ]; then
            echo "Missing TOTP_ISSUER secret."
            exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LINODE_SSH_KEY }}

      - name: Add Linode host key
        run: |
          set -eu
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Resolve server deployment directory
        id: deploy_root
        run: |
          set -eu

          DEPLOY_ROOT="$(
            ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" '
              set -eu
              BASE="/var/www/clients/client0/web13"

              if [ -d "${BASE}/private" ]; then
                printf "%s" "${BASE}/private/qubitx"
              elif [ -d "${BASE}" ]; then
                printf "%s" "${BASE}/qubitx"
              else
                echo "Missing deployment base path: ${BASE}" >&2
                exit 1
              fi
            '
          )"

          echo "path=${DEPLOY_ROOT}" >> "$GITHUB_OUTPUT"
          echo "Resolved deployment path: ${DEPLOY_ROOT}"

      - name: Build deployment bundle
        run: |
          set -eu

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.codex_artifacts' \
            -czf /tmp/qubitx-deploy.tgz \
            .

          {
            printf 'DATABASE_URL=%s\n' "${DATABASE_URL}"
            printf 'REDIS_URL=%s\n' "${REDIS_URL}"
            printf 'REDIS_QUEUE_PREFIX=%s\n' "${REDIS_QUEUE_PREFIX}"
            printf 'JWT_SECRET=%s\n' "${JWT_SECRET}"
            printf 'ZERODHA_API_KEY=%s\n' "${ZERODHA_API_KEY}"
            printf 'ZERODHA_API_SECRET=%s\n' "${ZERODHA_API_SECRET}"
            printf 'ZERODHA_ACCESS_TOKEN=%s\n' "${ZERODHA_ACCESS_TOKEN}"
            printf 'ZERODHA_REDIRECT_URL=%s\n' "${ZERODHA_REDIRECT_URL}"
            printf 'ZERODHA_LIVE_TRADING_ENABLED=%s\n' "${ZERODHA_LIVE_TRADING_ENABLED:-false}"
            printf 'PAPER_TRADING_ENABLED=%s\n' "${PAPER_TRADING_ENABLED:-true}"
            printf 'DAILY_SCAN_TIME=%s\n' "${DAILY_SCAN_TIME:-15:45}"
            printf 'MARKET_TIMEZONE=%s\n' "${MARKET_TIMEZONE:-Asia/Kolkata}"
            printf 'BUY_VOLUME_MULTIPLIER=%s\n' "${BUY_VOLUME_MULTIPLIER:-5}"
            printf 'SELL_VOLUME_MULTIPLIER=%s\n' "${SELL_VOLUME_MULTIPLIER:-3}"
            printf 'ENTRY_BUFFER_TICKS=%s\n' "${ENTRY_BUFFER_TICKS:-0.05}"
            printf 'STOP_BUFFER_TICKS=%s\n' "${STOP_BUFFER_TICKS:-0.05}"
            printf 'DAILY_CANDLE_LOOKBACK=%s\n' "${DAILY_CANDLE_LOOKBACK:-100}"
            printf 'SWING_WINDOW=%s\n' "${SWING_WINDOW:-2}"
            printf 'MAX_GAP_PERCENT=%s\n' "${MAX_GAP_PERCENT:-0.5}"
            printf 'MIN_SWING_DISTANCE=%s\n' "${MIN_SWING_DISTANCE:-1.0}"
            printf 'MOCK_DATA=%s\n' "${MOCK_DATA}"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "${TELEGRAM_BOT_TOKEN}"
            printf 'TELEGRAM_CHAT_ID=%s\n' "${TELEGRAM_CHAT_ID}"
            printf 'APP_HOST_BIND=%s\n' '127.0.0.1'
            printf 'API_HOST_PORT=%s\n' "${API_HOST_PORT}"
            printf 'LOG_LEVEL=%s\n' "${LOG_LEVEL}"
            printf 'ACCESS_TOKEN_EXPIRE_MINUTES=%s\n' "${ACCESS_TOKEN_EXPIRE_MINUTES}"
            printf 'SESSION_COOKIE_NAME=%s\n' "${SESSION_COOKIE_NAME}"
            printf 'SESSION_COOKIE_SECURE=%s\n' "${SESSION_COOKIE_SECURE}"
            printf 'INITIAL_ADMIN_EMAIL=%s\n' "${INITIAL_ADMIN_EMAIL}"
            printf 'INITIAL_ADMIN_PASSWORD=%s\n' "${INITIAL_ADMIN_PASSWORD}"
            printf 'INITIAL_ADMIN_NAME=%s\n' "${INITIAL_ADMIN_NAME}"
            printf 'TOTP_ISSUER=%s\n' "${TOTP_ISSUER}"
          } > /tmp/qubitx.env

      - name: Upload application bundle
        env:
          DEPLOY_ROOT: ${{ steps.deploy_root.outputs.path }}
        run: |
          set -eu

          scp -P "${DEPLOY_PORT}" /tmp/qubitx-deploy.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/qubitx-deploy.tgz"
          scp -P "${DEPLOY_PORT}" /tmp/qubitx.env "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/qubitx.env"

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu

            DEPLOY_ROOT='${DEPLOY_ROOT}'
            EXPECTED_PREFIX='/var/www/clients/client0/web13'

            case \"\${DEPLOY_ROOT}\" in
              \${EXPECTED_PREFIX}|\${EXPECTED_PREFIX}/*) ;;
              *)
                echo 'Refusing to deploy outside the Qubitx ISPConfig root.'
                exit 1
                ;;
            esac

            TMP_DIR=\$(mktemp -d)
            trap 'rm -rf \"\${TMP_DIR}\" /tmp/qubitx-deploy.tgz /tmp/qubitx.env' EXIT

            mkdir -p \"\${DEPLOY_ROOT}\"
            tar -xzf /tmp/qubitx-deploy.tgz -C \"\${TMP_DIR}\"

            find \"\${DEPLOY_ROOT}\" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -a \"\${TMP_DIR}\"/. \"\${DEPLOY_ROOT}\"/
            mv /tmp/qubitx.env \"\${DEPLOY_ROOT}/.env\"
          "

      - name: Run migrations and start Docker services on Linode
        env:
          DEPLOY_ROOT: ${{ steps.deploy_root.outputs.path }}
        run: |
          set -eu

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd '${DEPLOY_ROOT}'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the VPS.'
              exit 1
            fi

            API_PORT_VALUE=\$(awk -F= '/^API_HOST_PORT=/{print \$2}' .env | tail -n 1)
            if [ -z \"\${API_PORT_VALUE}\" ]; then
              API_PORT_VALUE='8095'
            fi

            \$COMPOSE_CMD down --remove-orphans || true

            for LEGACY_CONTAINER in trading-webhook-api trading-worker; do
              if docker ps -a --format '{{.Names}}' | grep -Fx \"\${LEGACY_CONTAINER}\" >/dev/null 2>&1; then
                echo \"Removing legacy container: \${LEGACY_CONTAINER}\"
                docker rm -f \"\${LEGACY_CONTAINER}\"
              fi
            done

            PORT_OWNER_NAMES=\$(docker ps --filter \"publish=\${API_PORT_VALUE}\" --format '{{.Names}}')
            if [ -n \"\${PORT_OWNER_NAMES}\" ]; then
              echo \"Port \${API_PORT_VALUE} is still occupied by: \${PORT_OWNER_NAMES}\"
              echo 'Refusing to stop unknown containers automatically.'
              exit 1
            fi

            \$COMPOSE_CMD build migrate api worker scheduler live-engine
            \$COMPOSE_CMD run --rm migrate
            \$COMPOSE_CMD up -d --remove-orphans api worker scheduler live-engine
            \$COMPOSE_CMD ps api worker scheduler live-engine

            sleep 8

            if ! curl --fail --silent --show-error \"http://127.0.0.1:\${API_PORT_VALUE}/health\" >/tmp/qubitx-health.json; then
              echo 'Health check failed. Recent compose status:'
              \$COMPOSE_CMD ps api worker scheduler live-engine
              echo 'Recent api logs:'
              \$COMPOSE_CMD logs --tail=120 api || true
              echo 'Recent worker logs:'
              \$COMPOSE_CMD logs --tail=120 worker || true
              echo 'Recent scheduler logs:'
              \$COMPOSE_CMD logs --tail=120 scheduler || true
              echo 'Recent live-engine logs:'
              \$COMPOSE_CMD logs --tail=120 live-engine || true
              exit 1
            fi

            cat /tmp/qubitx-health.json
          "

      - name: Verify reverse proxy health
        run: |
          set -eu
          curl --fail --silent --show-error "https://${APP_DOMAIN}/health"
