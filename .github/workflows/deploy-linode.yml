name: Deploy Qubitx AlgoTrade

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: qubitx-algotrade-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.LINODE_HOST }}
      DEPLOY_USER: ${{ secrets.LINODE_USERNAME }}
      DEPLOY_PORT: ${{ secrets.LINODE_PORT || '22' }}
      DEPLOY_BASE: /var/www/clients/client0/web13
      APP_DOMAIN: qubitx.ai
      HAS_DEPLOY_KEY: ${{ secrets.LINODE_SSH_KEY != '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SIGNAL_QUEUE_NAME: ${{ secrets.SIGNAL_QUEUE_NAME }}
      MOCK_DATA: ${{ secrets.MOCK_DATA }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      APP_PORT: ${{ secrets.APP_PORT }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
      SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
      INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
      INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
      INITIAL_ADMIN_NAME: ${{ secrets.INITIAL_ADMIN_NAME }}
      TOTP_ISSUER: ${{ secrets.TOTP_ISSUER }}
      STRATEGY_TUNING__LOOKBACKCANDLES: ${{ secrets.STRATEGY_TUNING__LOOKBACKCANDLES }}
      STRATEGY_TUNING__MAXGAPPERCENT: ${{ secrets.STRATEGY_TUNING__MAXGAPPERCENT }}
      STRATEGY_TUNING__MINSWINGDISTANCE: ${{ secrets.STRATEGY_TUNING__MINSWINGDISTANCE }}
      STRATEGY_TUNING__BUYVOLUMEMULTIPLIER: ${{ secrets.STRATEGY_TUNING__BUYVOLUMEMULTIPLIER }}
      STRATEGY_TUNING__SELLVOLUMEMULTIPLIER: ${{ secrets.STRATEGY_TUNING__SELLVOLUMEMULTIPLIER }}
      STRATEGY_TUNING__ENTRYBUFFERTICKS: ${{ secrets.STRATEGY_TUNING__ENTRYBUFFERTICKS }}
      STRATEGY_TUNING__STOPLOSSBUFFERTICKS: ${{ secrets.STRATEGY_TUNING__STOPLOSSBUFFERTICKS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          set -eu

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing LINODE_HOST secret."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing LINODE_USERNAME secret."
            exit 1
          fi

          if [ "${HAS_DEPLOY_KEY}" != "true" ]; then
            echo "Missing LINODE_SSH_KEY secret."
            exit 1
          fi

          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL secret."
            exit 1
          fi

          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "Missing WEBHOOK_SECRET secret."
            exit 1
          fi

          if [ -z "${REDIS_URL}" ]; then
            echo "Missing REDIS_URL secret."
            exit 1
          fi

          if [ -z "${JWT_SECRET}" ]; then
            echo "Missing JWT_SECRET secret."
            exit 1
          fi

          if [ -z "${SIGNAL_QUEUE_NAME}" ]; then
            echo "Missing SIGNAL_QUEUE_NAME secret."
            exit 1
          fi

          if [ -z "${APP_PORT}" ]; then
            echo "Missing APP_PORT secret."
            exit 1
          fi

          if [ -z "${INITIAL_ADMIN_EMAIL}" ]; then
            echo "Missing INITIAL_ADMIN_EMAIL secret."
            exit 1
          fi

          if [ -z "${INITIAL_ADMIN_PASSWORD}" ]; then
            echo "Missing INITIAL_ADMIN_PASSWORD secret."
            exit 1
          fi

          if [ -z "${INITIAL_ADMIN_NAME}" ]; then
            echo "Missing INITIAL_ADMIN_NAME secret."
            exit 1
          fi

          if [ -z "${SESSION_COOKIE_NAME}" ]; then
            echo "Missing SESSION_COOKIE_NAME secret."
            exit 1
          fi

          if [ -z "${SESSION_COOKIE_SECURE}" ]; then
            echo "Missing SESSION_COOKIE_SECURE secret."
            exit 1
          fi

          if [ -z "${ACCESS_TOKEN_EXPIRE_MINUTES}" ]; then
            echo "Missing ACCESS_TOKEN_EXPIRE_MINUTES secret."
            exit 1
          fi

          if [ -z "${LOG_LEVEL}" ]; then
            echo "Missing LOG_LEVEL secret."
            exit 1
          fi

          if [ -z "${MOCK_DATA}" ]; then
            echo "Missing MOCK_DATA secret."
            exit 1
          fi

          if [ -z "${TOTP_ISSUER}" ]; then
            echo "Missing TOTP_ISSUER secret."
            exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LINODE_SSH_KEY }}

      - name: Add Linode host key
        run: |
          set -eu
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Resolve server deployment directory
        id: deploy_root
        run: |
          set -eu

          DEPLOY_ROOT="$(
            ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" '
              set -eu
              BASE="/var/www/clients/client0/web13"

              if [ -d "${BASE}/private" ]; then
                printf "%s" "${BASE}/private/algotrade"
              elif [ -d "${BASE}" ]; then
                printf "%s" "${BASE}/algotrade"
              else
                echo "Missing deployment base path: ${BASE}" >&2
                exit 1
              fi
            '
          )"

          echo "path=${DEPLOY_ROOT}" >> "$GITHUB_OUTPUT"
          echo "Resolved deployment path: ${DEPLOY_ROOT}"

      - name: Build deployment bundle
        run: |
          set -eu

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.codex_artifacts' \
            -czf /tmp/algotrade-deploy.tgz \
            .

          {
            printf 'DATABASE_URL=%s\n' "${DATABASE_URL}"
            printf 'WEBHOOK_SECRET=%s\n' "${WEBHOOK_SECRET}"
            printf 'REDIS_URL=%s\n' "${REDIS_URL}"
            printf 'JWT_SECRET=%s\n' "${JWT_SECRET}"
            printf 'SIGNAL_QUEUE_NAME=%s\n' "${SIGNAL_QUEUE_NAME}"
            printf 'MOCK_DATA=%s\n' "${MOCK_DATA}"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "${TELEGRAM_BOT_TOKEN}"
            printf 'TELEGRAM_CHAT_ID=%s\n' "${TELEGRAM_CHAT_ID}"
            printf 'APP_HOST_BIND=%s\n' '127.0.0.1'
            printf 'APP_PORT=%s\n' "${APP_PORT}"
            printf 'LOG_LEVEL=%s\n' "${LOG_LEVEL}"
            printf 'ACCESS_TOKEN_EXPIRE_MINUTES=%s\n' "${ACCESS_TOKEN_EXPIRE_MINUTES}"
            printf 'SESSION_COOKIE_NAME=%s\n' "${SESSION_COOKIE_NAME}"
            printf 'SESSION_COOKIE_SECURE=%s\n' "${SESSION_COOKIE_SECURE}"
            printf 'INITIAL_ADMIN_EMAIL=%s\n' "${INITIAL_ADMIN_EMAIL}"
            printf 'INITIAL_ADMIN_PASSWORD=%s\n' "${INITIAL_ADMIN_PASSWORD}"
            printf 'INITIAL_ADMIN_NAME=%s\n' "${INITIAL_ADMIN_NAME}"
            printf 'TOTP_ISSUER=%s\n' "${TOTP_ISSUER}"
            printf 'STRATEGY_TUNING__LOOKBACKCANDLES=%s\n' "${STRATEGY_TUNING__LOOKBACKCANDLES:-20}"
            printf 'STRATEGY_TUNING__MAXGAPPERCENT=%s\n' "${STRATEGY_TUNING__MAXGAPPERCENT:-0.5}"
            printf 'STRATEGY_TUNING__MINSWINGDISTANCE=%s\n' "${STRATEGY_TUNING__MINSWINGDISTANCE:-1.0}"
            printf 'STRATEGY_TUNING__BUYVOLUMEMULTIPLIER=%s\n' "${STRATEGY_TUNING__BUYVOLUMEMULTIPLIER:-1.0}"
            printf 'STRATEGY_TUNING__SELLVOLUMEMULTIPLIER=%s\n' "${STRATEGY_TUNING__SELLVOLUMEMULTIPLIER:-1.0}"
            printf 'STRATEGY_TUNING__ENTRYBUFFERTICKS=%s\n' "${STRATEGY_TUNING__ENTRYBUFFERTICKS:-0.05}"
            printf 'STRATEGY_TUNING__STOPLOSSBUFFERTICKS=%s\n' "${STRATEGY_TUNING__STOPLOSSBUFFERTICKS:-0.05}"
          } > /tmp/algotrade.env

      - name: Upload application bundle
        env:
          DEPLOY_ROOT: ${{ steps.deploy_root.outputs.path }}
        run: |
          set -eu

          scp -P "${DEPLOY_PORT}" /tmp/algotrade-deploy.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/algotrade-deploy.tgz"
          scp -P "${DEPLOY_PORT}" /tmp/algotrade.env "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/algotrade.env"

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu

            DEPLOY_ROOT='${DEPLOY_ROOT}'
            EXPECTED_PREFIX='/var/www/clients/client0/web13'

            case \"\${DEPLOY_ROOT}\" in
              \${EXPECTED_PREFIX}|\${EXPECTED_PREFIX}/*) ;;
              *)
                echo 'Refusing to deploy outside the Qubitx ISPConfig root.'
                exit 1
                ;;
            esac

            TMP_DIR=\$(mktemp -d)
            trap 'rm -rf \"\${TMP_DIR}\" /tmp/algotrade-deploy.tgz /tmp/algotrade.env' EXIT

            mkdir -p \"\${DEPLOY_ROOT}\"
            tar -xzf /tmp/algotrade-deploy.tgz -C \"\${TMP_DIR}\"

            find \"\${DEPLOY_ROOT}\" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -a \"\${TMP_DIR}\"/. \"\${DEPLOY_ROOT}\"/
            mv /tmp/algotrade.env \"\${DEPLOY_ROOT}/.env\"
          "

      - name: Start Docker services on Linode
        env:
          DEPLOY_ROOT: ${{ steps.deploy_root.outputs.path }}
        run: |
          set -eu

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd '${DEPLOY_ROOT}'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the VPS.'
              exit 1
            fi

            \$COMPOSE_CMD up --build -d
            \$COMPOSE_CMD ps

            APP_PORT_VALUE=\$(awk -F= '/^APP_PORT=/{print \$2}' .env | tail -n 1)
            if [ -z \"\${APP_PORT_VALUE}\" ]; then
              APP_PORT_VALUE='8095'
            fi

            sleep 8

            if ! curl --fail --silent --show-error \"http://127.0.0.1:\${APP_PORT_VALUE}/health\" >/tmp/algotrade-health.json; then
              echo 'Health check failed. Recent compose status:'
              \$COMPOSE_CMD ps
              echo 'Recent trading-webhook-api logs:'
              \$COMPOSE_CMD logs --tail=120 trading-webhook-api || true
              echo 'Recent trading-worker logs:'
              \$COMPOSE_CMD logs --tail=120 trading-worker || true
              exit 1
            fi

            cat /tmp/algotrade-health.json
          "
